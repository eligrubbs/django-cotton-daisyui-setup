{% comment %}
DaisyUI Toggle Component

https://daisyui.com/components/toggle/

{% endcomment %}

<c-vars
    class=""
    color=""
    size=""
    checked
    validate
    :colorClasses="{
      '': '',
      'primary': 'toggle-primary',
      'secondary': 'toggle-secondary',
      'accent': 'toggle-accent',
      'neutral': 'toggle-neutral',
      'info': 'toggle-info',
      'success': 'toggle-success',
      'warning': 'toggle-warning',
      'error': 'toggle-error'
    }"
    :sizeClasses="{
      '': '',
      'xs': 'toggle-xs',
      'sm': 'toggle-sm',
      'md': 'toggle-md',
      'lg': 'toggle-lg',
      'xl': 'toggle-xl'
    }"
/>

<input
    type="checkbox"
    class="
      toggle
      {{ colorClasses|get_item:color }}
      {{ sizeClasses|get_item:size }}
      {% if validate %}validator{% endif %}
      {{ class }}
    "
    {% if checked %}checked="checked"{% endif %}
    {{ attrs }}
/>
