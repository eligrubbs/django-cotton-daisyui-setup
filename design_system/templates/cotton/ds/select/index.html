{% comment %}
DaisyUI Select Component

https://daisyui.com/components/select/

{% endcomment %}


<c-vars
    class=""
    color=""
    size=""
    style_=""
    :colorClasses="{
      '': '',
      'neutral': 'select-neutral',
      'primary': 'select-primary',
      'secondary': 'select-secondary',
      'accent': 'select-accent',
      'info': 'select-info',
      'success': 'select-success',
      'warning': 'select-warning',
      'error': 'select-error',
    }"
    :sizeClasses="{
      '': '',
      'xs': 'select-xs',
      'sm': 'select-sm',
      'md': 'select-md',
      'lg': 'select-lg',
      'xl': 'select-xl',
    }"
    :styleClasses="{
      '': '',
      'ghost': 'select-ghost',
    }"
    validate
/>

<select
  class="select {{ colorClasses|get_item:color }} {{ sizeClasses|get_item:size }} {{ styleClasses|get_item:style_ }} {% if validate %}validator{% endif %} {{ class }}"
  {{ attrs }}
>
  {{ slot }}

</select>
