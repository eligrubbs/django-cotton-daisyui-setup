
<c-vars
    class=""
    as="div"
    horizontal=""
    :horizontalClasses="{
      '': '',
      'start': 'toast-start',
      'center': 'toast-center',
      'end': 'toast-end'
    }"
    vertical=""
    :verticalClasses="{
      '': '',
      'top': 'toast-top',
      'middle': 'toast-middle',
      'bottom': 'toast-bottom'
    }"
/>

<{{ as }} class="toast {{ horizontalClasses|get_item:horizontal }} {{ verticalClasses|get_item:vertical }} {{ class }}" {{ attrs }}>
    {{ slot }}
</{{ as }}>
