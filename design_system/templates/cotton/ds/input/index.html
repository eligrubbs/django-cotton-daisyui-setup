{% comment %}

{% endcomment %}


<c-vars
    class=""
    color=""
    size=""
    style_=""
    :colorClasses="{
        'neutral': 'input-neutral',
        'primary': 'input-primary',
        'secondary': 'input-secondary',
        'accent': 'input-accent',
        'info': 'input-info',
        'success': 'input-success',
        'warning': 'input-warning',
        'error': 'input-error'
    }"
    :sizeClasses="{
        'xs': 'input-xs',
        'sm': 'input-sm',
        'md': 'input-md',
        'lg': 'input-lg',
        'xl': 'input-xl'
    }"
    :styleClasses="{
      '': '',
      'ghost': 'input-ghost',
    }"
    validate
/>

<input
    class="input {{ colorClasses|get_item:color }} {{ sizeClasses|get_item:size }} {{ styleClasses|get_item:style_ }} {% if validate %}validator{% endif %} {{ class }}"
    {{ attrs }}
/>
