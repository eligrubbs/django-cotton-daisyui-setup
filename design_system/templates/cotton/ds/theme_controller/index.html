{% comment %}
Custom DaisyUI theme controller element

Has light, dark, and system settings

Requires you out head_js and footer_js parts into the relevant places in your html pages.

https://daisyui.com/components/theme-controller/

{% endcomment %}

<c-ds.button
  :attrs="attrs"
  size="sm"
  variant="outline"
  modifier="square"
  class="relative overflow-hidden {{ class }}"
  aria-label="Toggle Theme"
  data-theme-control
>
  <svg
    class="absolute size-4.5 -translate-y-4 opacity-0 transition-all duration-300 [html[data-theme=light]_&]:translate-y-0 [html[data-theme=light]_&]:opacity-100"
    xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>
  </svg>
  <svg
    class="absolute size-4.5 translate-y-4 opacity-0 transition-all duration-300 [html[data-theme=dark]_&]:translate-y-0 [html[data-theme=dark]_&]:opacity-100"
    xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401"/>
  </svg>
  <svg
    class="absolute size-4.5 translate-x-4 opacity-0 transition-all duration-300 [html:not([data-theme])_&]:translate-x-0 [html:not([data-theme])_&]:opacity-100"
    xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" x2="16" y1="21" y2="21"/><line x1="12" x2="12" y1="17" y2="21"/>
  </svg>
</c-ds.button>
