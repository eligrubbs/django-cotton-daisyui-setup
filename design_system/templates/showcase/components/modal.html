{% extends "showcase/_base.html" %}

{% block title %}Modal Showcase{% endblock %}

{% block content %}
<div class="mb-8">
    <h2 class="text-3xl font-bold mb-2">Modal</h2>
    <p class="text-base-content/70">We have implemented around the recommended Dialog option.</p>
</div>

<section class="space-y-8 bg-base-100 p-6 rounded-box shadow-sm border border-base-300">

  <div>
    <h3 class="text-lg font-semibold mb-4">Modal Basic</h3>
    <div>
      <c-ds.modal.opener modal_id="example_modal_1" size="sm">open modal</c-ds.modal.opener>

      <c-ds.modal id_="example_modal_1" placement="middle">
        <c-slot name="box">
          <div class="modal-box">
            <h3 class="text-lg font-bold">Hello!</h3>
            <p class="py-4">Press ESC key or click the button below to close</p>
            
            <c-ds.modal.action>
              <c-ds.modal.closer position="top-right"></c-ds.modal.closer>
            </c-ds.modal.action>
          </div>
        </c-slot>
      </c-ds.modal>

    </div>
  </div>
</section>
{% endblock %}
