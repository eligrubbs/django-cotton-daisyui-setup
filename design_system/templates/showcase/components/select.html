{% extends "showcase/_base.html" %}

{% block title %}Select Showcase{% endblock %}

{% block content %}
<div class="mb-8">
    <h2 class="text-3xl font-bold mb-2">Select</h2>
    <p class="text-base-content/70">All available DaisyUI select colors and modifiers.</p>
</div>

<section class="space-y-8 bg-base-100 p-6 rounded-box shadow-sm border border-base-300">

    <div>
      <h3 class="text-lg font-semibold mb-4">Disabled</h3>
      <div class="flex flex-wrap gap-4">
        <c-ds.select disabled>
          <option>You can't touch this</option>
        </c-ds.select>
      </div>
    </div>

    <div>
      <h3 class="text-lg font-semibold mb-4">Ghost</h3>
      <div class="flex flex-wrap gap-4">
        <c-ds.select style_="ghost">
          <option disabled selected>Pick one</option>
          <option>Choice 2</option>
        </c-ds.select>
      </div>
    </div>

    <div>
      <h3 class="text-lg font-semibold mb-4">Sizes</h3>
      <div class="flex flex-wrap gap-4">
          <c-ds.select size="xs">
            <option>Bob</option>
          </c-ds.select>
          <c-ds.select size="sm">
            <option>Bob</option>
          </c-ds.select>
          <c-ds.select size="md">
            <option>Bob</option>
          </c-ds.select>
          <c-ds.select size="lg">
            <option>Bob</option>
          </c-ds.select>
          <c-ds.select size="xl">
            <option>Bob</option>
          </c-ds.select>
      </div>
    </div>

    <div>
      <h3 class="text-lg font-semibold mb-4">Colors</h3>
      <div class="flex flex-wrap gap-4">
        {% for col in design_system.colors %}
          <c-ds.select color="{{ col }}">
            <option disabled selected>Pick an OS</option>
            <option>Windows</option>
            <option>MacOS</option>
            <option>Linux</option>
          </c-ds.select>
        {% endfor %}

      </div>
    </div>

</section>
{% endblock %}
