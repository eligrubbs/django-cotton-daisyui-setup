{% extends "showcase/_base.html" %}

{% block title %}Kbd Showcase{% endblock %}

{% block content %}
<div class="mb-8">
    <h2 class="text-3xl font-bold mb-2">Kbd</h2>
    <p class="text-base-content/70">All available DaisyUI kbd colors and modifiers.</p>
</div>

<section class="space-y-8 bg-base-100 p-6 rounded-box shadow-sm border border-base-300">

    <div>
      <h3 class="text-lg font-semibold mb-4">Size</h3>
      <div class="flex flex-row gap-2">
        <c-ds.kbd size="xs" class="w-fit">XSmall</c-ds.kbd>
        <c-ds.kbd size="sm" class="w-fit">Small</c-ds.kbd>
        <c-ds.kbd size="md" class="w-fit">Medium</c-ds.kbd>
        <c-ds.kbd size="lg" class="w-fit">Large</c-ds.kbd>
        <c-ds.kbd size="xl" class="w-fit">XLarge</c-ds.kbd>
      </div>
    </div>

    <div>
      <h3 class="text-lg font-semibold mb-4">Colors</h3>
      <div class="flex flex-row gap-2">
        {% for col in design_system.colors %}
          <c-ds.kbd color="{{col}}" class="w-fit">⌘K</c-ds.kbd>  
        {% endfor %}
      </div>
    </div>

</section>
{% endblock %}
