{% extends "showcase/_base.html" %}

{% block title %}Text Rotate Showcase{% endblock %}

{% block content %}
<div class="mb-8">
    <h2 class="text-3xl font-bold mb-2">Text Rotate</h2>
    <p class="text-base-content/70">Sample DaisyUI Text Rotate.</p>
</div>

<section class="space-y-8 bg-base-100 p-6 rounded-box shadow-sm border border-base-300">

    <div>
      <h3 class="text-lg font-semibold mb-4">Rotating words in a sentence (2 seconds)</h3>

      <span>
        Providing AI Agents for 
        <c-ds.text-rotate duration="duration-4000">
          <span class="bg-teal-400 text-teal-800 px-2">Designers</span>
          <span class="bg-red-400 text-red-800 px-2">Developers</span>
          <span class="bg-blue-400 text-blue-800 px-2">Managers</span>
        </c-ds.text-rotate>
        
      </span>

    </div>

</section>
{% endblock %}
