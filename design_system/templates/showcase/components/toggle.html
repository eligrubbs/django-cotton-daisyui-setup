{% extends "showcase/_base.html" %}

{% block title %}Toggle Showcase{% endblock %}

{% block content %}
<div class="mb-8">
    <h2 class="text-3xl font-bold mb-2">Toggle</h2>
    <p class="text-base-content/70">All available DaisyUI toggle colors and modifiers.</p>
</div>

<section class="space-y-8 bg-base-100 p-6 rounded-box shadow-sm border border-base-300">

    <div>
      <h3 class="text-lg font-semibold mb-4">Sizes</h3>
      <div class="flex flex-wrap gap-4">
        <c-ds.toggle size="xs" checked/>
        <c-ds.toggle size="sm" checked />
        <c-ds.toggle size="md" checked />
        <c-ds.toggle size="lg" checked />
        <c-ds.toggle size="xl" checked />
      </div>
    </div>

    <div>
      <h3 class="text-lg font-semibold mb-4">Colors</h3>
      <div class="flex flex-wrap gap-4">
        <c-ds.toggle color="primary" checked />
        <c-ds.toggle color="secondary" checked />
        <c-ds.toggle color="accent" checked />
        <c-ds.toggle color="neutral" checked />
        <c-ds.toggle color="info" checked />
        <c-ds.toggle color="success" checked />
        <c-ds.toggle color="warning" checked />
        <c-ds.toggle color="error" checked />
      </div>
    </div>

    <div>
      <h3 class="text-lg font-semibold mb-4">Disabled</h3>
      <div>
        <c-ds.toggle disabled />
        <c-ds.toggle checked disabled />
      </div>
    </div>

</section>
{% endblock %}
