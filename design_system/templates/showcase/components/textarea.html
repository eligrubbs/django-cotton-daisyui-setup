{% extends "showcase/_base.html" %}

{% block title %}Textarea Showcase{% endblock %}

{% block content %}
<div class="mb-8">
    <h2 class="text-3xl font-bold mb-2">Textarea</h2>
    <p class="text-base-content/70">All available DaisyUI textarea colors and modifiers.</p>
</div>

<section class="space-y-8 bg-base-100 p-6 rounded-box shadow-sm border border-base-300">

    <div>
      <h3 class="text-lg font-semibold mb-4">Colors</h3>
      <div class="flex flex-wrap gap-6 gap-y-10">
        {% for col in design_system.colors %}
          <div>
            <c-ds.textarea color="{{ col }}" placeholder="Enter Text"></c-ds.textarea>
          </div>
        {% endfor %}
      </div>
    </div>

    <div>
      <h3 class="text-lg font-semibold mb-16">Size</h3>
      <c-ds.textarea size="xs" placeholder="Enter XS Text"></c-ds.textarea>
      <c-ds.textarea size="sm" placeholder="Enter SM Text"></c-ds.textarea>
      <c-ds.textarea size="md" placeholder="Enter MD Text"></c-ds.textarea>
      <c-ds.textarea size="lg" placeholder="Enter LG Text"></c-ds.textarea>
      <c-ds.textarea size="xl" placeholder="Enter XL Text"></c-ds.textarea>
    </div>


    <div>
      <h3 class="text-lg font-semibold">Ghost</h3>
      <c-ds.textarea style_="ghost" placeholder="Enter  Text"></c-ds.textarea>
    </div>

    <div>
      <h3 class="text-lg font-semibold">Disabled</h3>
      <c-ds.textarea disabled placeholder="Cant Enter Text"></c-ds.textarea>
    </div>

    </div>

</section>
{% endblock %}
