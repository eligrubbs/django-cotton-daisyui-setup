{% extends "showcase/_base.html" %}

{% block title %}Progress Showcase{% endblock %}

{% block content %}
<div class="mb-8">
    <h2 class="text-3xl font-bold mb-2">Progress</h2>
    <p class="text-base-content/70">All available DaisyUI progress colors and modifiers.</p>
</div>

<section class="space-y-8 bg-base-100 p-6 rounded-box shadow-sm border border-base-300">

    <div>
      <h3 class="text-lg font-semibold mb-4">Colors</h3>
      {% for col in design_system.colors %}
        <h4>{{ col }}</h4>
        <div class="flex flex-wrap gap-4 w-56">
            <c-ds.progress color="{{col}}" value="0" max="100"></c-ds.progress>
            <c-ds.progress color="{{col}}" value="10" max="100"></c-ds.progress>
            <c-ds.progress color="{{col}}" value="40" max="100"></c-ds.progress>
            <c-ds.progress color="{{col}}" value="70" max="100"></c-ds.progress>
            <c-ds.progress color="{{col}}" value="100" max="100"></c-ds.progress>
            <c-ds.progress color="{{col}}"></c-ds.progress>
        </div>

        <br>

      {% endfor %}
    </div>

</section>
{% endblock %}
