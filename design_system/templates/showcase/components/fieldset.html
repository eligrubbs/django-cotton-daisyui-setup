{% extends "showcase/_base.html" %}

{% block title %}Fieldset Showcase{% endblock %}

{% block content %}
<div class="mb-8">
    <h2 class="text-3xl font-bold mb-2">Fieldset</h2>
    <p class="text-base-content/70">Key demonstration of fieldset.</p>
</div>

<section class="space-y-8 bg-base-100 p-6 rounded-box shadow-sm border border-base-300">

    <div>
      <h3 class="text-lg font-semibold mb-4">Login form with fieldset</h3>
      <div class="flex flex-wrap gap-4">

          <c-ds.fieldset legend="Login" class="bg-base-200 border-base-300 rounded-box w-xs border p-4">

            <label class="label">Email</label>
            <input type="email" class="input" placeholder="Email" />

            <label class="label">Password</label>
            <input type="password" class="input" placeholder="Password" />

            <button class="btn btn-neutral mt-4">Login</button>
          </c-ds.fieldset>

      </div>
    </div>

</section>
{% endblock %}
