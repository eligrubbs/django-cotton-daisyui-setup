{% extends "showcase/_base.html" %}

{% block title %}Checkbox Showcase{% endblock %}

{% block content %}
<div class="mb-8">
    <h2 class="text-3xl font-bold mb-2">Checkbox</h2>
    <p class="text-base-content/70">All available DaisyUI checkbox colors and modifiers.</p>
</div>

<section class="space-y-8 bg-base-100 p-6 rounded-box shadow-sm border border-base-300">

    <div>
      <h3 class="text-lg font-semibold mb-4">Sizes</h3>
      <div class="flex flex-wrap gap-4">
          <c-ds.checkbox size="xs" checked></c-ds.checkbox>
          <c-ds.checkbox size="sm" checked ></c-ds.checkbox>
          <c-ds.checkbox size="md" checked ></c-ds.checkbox>
          <c-ds.checkbox size="lg" checked ></c-ds.checkbox>
          <c-ds.checkbox size="xl" checked ></c-ds.checkbox>
      </div>
    </div>

    <div>
        <h3 class="text-lg font-semibold mb-4">Colors</h3>
        <div class="flex flex-wrap gap-4">
            <c-ds.checkbox color="primary" checked >Primary</c-ds.checkbox>
            <c-ds.checkbox color="secondary" checked >Secondary</c-ds.checkbox>
            <c-ds.checkbox color="accent" checked >Accent</c-ds.checkbox>
            <c-ds.checkbox color="neutral" checked >Neutral</c-ds.checkbox>
            <c-ds.checkbox color="info" checked >Info</c-ds.checkbox>
            <c-ds.checkbox color="success" checked >Success</c-ds.checkbox>
            <c-ds.checkbox color="warning" checked >Warning</c-ds.checkbox>
            <c-ds.checkbox color="error" checked >Error</c-ds.checkbox>
        </div>
    </div>

</section>
{% endblock %}
