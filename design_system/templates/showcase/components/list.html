{% extends "showcase/_base.html" %}

{% block title %}List Showcase{% endblock %}

{% block content %}
<div class="mb-8">
    <h2 class="text-3xl font-bold mb-2">List</h2>
    <p class="text-base-content/70">Sample DaisyUI Lists.</p>
</div>

<section class="space-y-8 bg-base-100 p-6 rounded-box shadow-sm border border-base-300">

    <div>
      <h3 class="text-lg font-semibold mb-4">List (second column grows - default)</h3>

      <c-ds.list class="bg-base-100 rounded-box shadow-md">
        <c-ds.list.row class="p-4 pb-2 text-xs opacity-60 tracking-wide">
          Most played songs this week
        </c-ds.list.row>

        {% for i in "123"|make_list %}
          <c-ds.list.row>
            <c-ds.avatar class="size-10" rounded="xl" src="https://img.daisyui.com/images/profile/demo/1@94.webp"/>
            <div>
              <div>Dio Lupa</div>
              <div class="text-xs uppercase font-semibold opacity-60">Remaining Reason</div>
            </div>
            <c-ds.button modifier="square" style_="ghost">
              <svg class="size-[1.2em]" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><g stroke-linejoin="round" stroke-linecap="round" stroke-width="2" fill="none" stroke="currentColor"><path d="M6 3L20 12 6 21 6 3z"></path></g></svg>
            </c-ds.button>
            <c-ds.button modifier="square" style_="ghost">
              <svg class="size-[1.2em]" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><g stroke-linejoin="round" stroke-linecap="round" stroke-width="2" fill="none" stroke="currentColor"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"></path></g></svg>
            </c-ds.button>
          </c-ds.list.row>
        {% endfor %}

      </c-ds.list>
      

    </div>


</section>
{% endblock %}
